# ChainAPI — Linux + Windows CI on AppVeyor.
#
# macOS lives on Azure DevOps (see azure-pipelines.yml). GitHub Actions is no
# longer used for ChainAPI builds.
#
# Branch routing:
#   * push to dev  → linux-debug   + windows-debug   (ASan + UBSan + tests on Linux,
#                                                     plain Debug build+test on Windows)
#   * push to main → linux-release + windows-release (-O2, build only)
#
# Qt 6.8 LTS comes from the official Qt download mirror via aqtinstall, NOT
# from vcpkg. Building qtbase from source via vcpkg blew past AppVeyor's
# 60-minute-per-job cap; pre-built Qt brings cold-cache builds to ~10-15 min.

version: '0.1.0+{build}'

# Trigger only on dev and main pushes; ignore PRs and tags.
branches:
  only:
    - main
    - dev

skip_tags: true
skip_branch_with_pr: true

# Repository hygiene.
clone_depth: 1
shallow_clone: true

# Pinned versions used by every job.
environment:
  VCPKG_COMMIT: aa40adda5352e87655b8583cfb2451d5e9e276fd
  QT_VERSION: 6.8.3
  AQT_VERSION: 3.3.0

# --------------------------------------------------------------------------
# Cache strategy:
#   * vcpkg tool tree (cheap to clone, expensive when network blips).
#   * vcpkg binary cache (compiled curl/sqlite3/yaml-cpp/nlohmann-json/gtest).
#     Qt is no longer in vcpkg, so this cache is small and fast.
#   * Qt 6.8 install dir, keyed on QT_VERSION + the appveyor.yml hash.
# AppVeyor invalidates a cache when its YAML hash changes; clear the cache
# via the AppVeyor UI if vcpkg.json drifts mid-debug.
# --------------------------------------------------------------------------
cache:
  - vcpkg -> vcpkg.json, appveyor.yml
  - C:\vcpkg-bincache -> vcpkg.json, appveyor.yml
  - /home/appveyor/vcpkg-bincache -> vcpkg.json, appveyor.yml
  - C:\Qt -> appveyor.yml, vcpkg.json
  - /home/appveyor/Qt -> appveyor.yml, vcpkg.json

# --------------------------------------------------------------------------
# Build matrix: Linux + Windows × (debug | release). The preset is chosen at
# install time based on the branch (see install: scripts).
# --------------------------------------------------------------------------
image:
  - Ubuntu2404
  - Visual Studio 2022

# Avoid AppVeyor's default MSBuild-only flow.
build: off

# --------------------------------------------------------------------------
# Per-OS prereqs + CMake 4.x + Qt 6.8 + vcpkg bootstrap.
# --------------------------------------------------------------------------
install:
  # ----- Linux -----------------------------------------------------------
  - sh: |
      set -euo pipefail

      # System deps for vcpkg ports + Qt's runtime XCB stack.
      sudo apt-get update
      sudo apt-get install -y --no-install-recommends \
        autoconf autoconf-archive automake libtool pkg-config \
        ninja-build python3 python3-pip python3-venv \
        libx11-dev libxext-dev libxrender-dev \
        libxkbcommon-dev libxkbcommon-x11-dev \
        libxcb1-dev libxcb-cursor-dev libxcb-glx0-dev libxcb-icccm4-dev \
        libxcb-image0-dev libxcb-keysyms1-dev libxcb-randr0-dev \
        libxcb-render-util0-dev libxcb-shape0-dev libxcb-shm0-dev \
        libxcb-sync-dev libxcb-util-dev libxcb-xfixes0-dev \
        libxcb-xinerama0-dev libxcb-xkb-dev libxi-dev \
        libgl1-mesa-dev libegl1-mesa-dev \
        libfontconfig1-dev libfreetype6-dev libdbus-1-dev

      # CMake 4.x via pip — AppVeyor Ubuntu ships 3.x.
      python3 -m pip install --upgrade --quiet --break-system-packages \
        "cmake~=4.0" "aqtinstall==${AQT_VERSION}"

      export PATH="$HOME/.local/bin:$PATH"
      cmake --version

      # Install Qt 6.8 desktop into ~/Qt if not already cached. Check for
      # qconfig.pri specifically so a partial install (e.g. interrupted by
      # a previous aqtinstall metadata bug) doesn't masquerade as cached.
      mkdir -p "$HOME/Qt"
      qt_marker="$HOME/Qt/${QT_VERSION}/gcc_64/mkspecs/qconfig.pri"
      if [[ ! -f "$qt_marker" ]]; then
        rm -rf "$HOME/Qt/${QT_VERSION}"
        aqt install-qt linux desktop "${QT_VERSION}" linux_gcc_64 \
          --outputdir "$HOME/Qt"
      else
        echo "Qt ${QT_VERSION} already present from cache."
      fi

      QT_PREFIX="$HOME/Qt/${QT_VERSION}/gcc_64"
      [[ -f "$QT_PREFIX/lib/cmake/Qt6/Qt6Config.cmake" ]] || {
        echo "error: Qt6Config.cmake missing under $QT_PREFIX" >&2
        exit 1
      }

      # vcpkg binary cache lives outside vcpkg/ so the vcpkg tree cache
      # doesn't churn it.
      VCPKG_DEFAULT_BINARY_CACHE="$HOME/vcpkg-bincache"
      mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      # Pick preset by branch.
      if [[ "$APPVEYOR_REPO_BRANCH" == "main" ]]; then
        PRESET=linux-release
      else
        PRESET=linux-debug
      fi

      # Persist values for subsequent steps.
      appveyor SetVariable -Name PATH -Value "$HOME/.local/bin:$PATH"
      appveyor SetVariable -Name CMAKE_PREFIX_PATH -Value "$QT_PREFIX"
      appveyor SetVariable -Name VCPKG_DEFAULT_BINARY_CACHE -Value "$VCPKG_DEFAULT_BINARY_CACHE"
      appveyor SetVariable -Name PRESET -Value "$PRESET"

  # ----- Windows ---------------------------------------------------------
  - cmd: |
      REM AppVeyor VS2022 image ships CMake 3.x. Force 4.x via Chocolatey.
      choco upgrade cmake --version=4.0.2 --installargs "ADD_CMAKE_TO_PATH=System" --no-progress -y || exit /b
      REM Refresh PATH so the new cmake is visible in subsequent commands.
      call refreshenv

      REM aqtinstall — pin via pip so cache invalidation is predictable.
      python -m pip install --upgrade --quiet "aqtinstall==%AQT_VERSION%" || exit /b

      REM Install Qt 6.8 for MSVC 2022 64-bit if not already cached. Check
      REM for the qconfig.pri marker specifically so a partial install
      REM doesn't masquerade as cached.
      set "QT_MARKER=C:\Qt\%QT_VERSION%\msvc2022_64\mkspecs\qconfig.pri"
      if exist "%QT_MARKER%" goto :qt_cached
      if exist "C:\Qt\%QT_VERSION%" rmdir /s /q "C:\Qt\%QT_VERSION%"
      aqt install-qt windows desktop %QT_VERSION% win64_msvc2022_64 --outputdir C:\Qt
      if errorlevel 1 exit /b 1
      goto :qt_done
      :qt_cached
      echo Qt %QT_VERSION% already present from cache.
      :qt_done

      if not exist "C:\vcpkg-bincache" mkdir "C:\vcpkg-bincache"

      REM Pick preset by branch and persist Qt prefix + cache paths.
      appveyor SetVariable -Name CMAKE_PREFIX_PATH -Value "C:\Qt\%QT_VERSION%\msvc2022_64"
      appveyor SetVariable -Name VCPKG_DEFAULT_BINARY_CACHE -Value "C:\vcpkg-bincache"
      if "%APPVEYOR_REPO_BRANCH%" == "main" (appveyor SetVariable -Name PRESET -Value "windows-release") else (appveyor SetVariable -Name PRESET -Value "windows-debug")

# --------------------------------------------------------------------------
# Bootstrap vcpkg (cached between runs) and run configure + build + test.
# --------------------------------------------------------------------------
before_build:
  - sh: |
      set -euo pipefail
      export PATH="$HOME/.local/bin:$PATH"
      export VCPKG_ROOT="$APPVEYOR_BUILD_FOLDER/vcpkg"
      export VCPKG_BINARY_SOURCES="clear;files,$VCPKG_DEFAULT_BINARY_CACHE,readwrite"
      appveyor SetVariable -Name VCPKG_ROOT -Value "$VCPKG_ROOT"
      appveyor SetVariable -Name VCPKG_BINARY_SOURCES -Value "$VCPKG_BINARY_SOURCES"
      if [[ ! -x "$VCPKG_ROOT/vcpkg" ]]; then
        git clone https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
        git -C "$VCPKG_ROOT" checkout "$VCPKG_COMMIT"
        "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics
      else
        echo "vcpkg already present from cache."
      fi

  - cmd: |
      set VCPKG_ROOT=%APPVEYOR_BUILD_FOLDER%\vcpkg
      set VCPKG_BINARY_SOURCES=clear;files,%VCPKG_DEFAULT_BINARY_CACHE%,readwrite
      appveyor SetVariable -Name VCPKG_ROOT -Value "%VCPKG_ROOT%"
      appveyor SetVariable -Name VCPKG_BINARY_SOURCES -Value "%VCPKG_BINARY_SOURCES%"
      if not exist "%VCPKG_ROOT%\vcpkg.exe" (
        git clone https://github.com/microsoft/vcpkg.git "%VCPKG_ROOT%"
        git -C "%VCPKG_ROOT%" checkout "%VCPKG_COMMIT%"
        call "%VCPKG_ROOT%\bootstrap-vcpkg.bat" -disableMetrics
      ) else (
        echo vcpkg already present from cache.
      )

# --------------------------------------------------------------------------
# Configure / Build / Test.
# --------------------------------------------------------------------------
build_script:
  - sh: |
      set -euo pipefail
      export PATH="$HOME/.local/bin:$PATH"
      cmake --preset "$PRESET"
      cmake --build --preset "$PRESET"

  - cmd: |
      cmake --preset %PRESET% || exit /b
      cmake --build --preset %PRESET% || exit /b

test_script:
  - sh: |
      set -euo pipefail
      export PATH="$HOME/.local/bin:$PATH"
      # Tests only run on debug presets (release presets don't define a
      # testPreset entry in CMakePresets.json).
      if [[ "$PRESET" == *"-debug" ]]; then
        ctest --preset "$PRESET"
      else
        echo "Skipping tests on release preset."
      fi

  - cmd: |
      if "%PRESET:~-6%" == "-debug" (
        ctest --preset %PRESET% || exit /b
      ) else (
        echo Skipping tests on release preset.
      )
