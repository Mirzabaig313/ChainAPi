<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="320">
      <stop offset="0" stop-color="#1a1f3a"/>
      <stop offset="1" stop-color="#0a0d1a"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6a8aff"/>
      <stop offset="1" stop-color="#2c4ddb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="480" height="320" fill="url(#bg)" rx="16"/>

  <!-- Dependency graph illustration: 5 actors/resources connected -->
  <g stroke="#4a6cf7" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <line x1="80"  y1="80"  x2="200" y2="160"/>
    <line x1="200" y1="60"  x2="200" y2="160"/>
    <line x1="320" y1="80"  x2="200" y2="160"/>
    <line x1="200" y1="160" x2="120" y2="240"/>
    <line x1="200" y1="160" x2="280" y2="240"/>
    <line x1="280" y1="240" x2="400" y2="200"/>
  </g>

  <!-- Nodes -->
  <g filter="url(#glow)" opacity="0.4">
    <circle cx="80"  cy="80"  r="20" fill="url(#node)"/>
    <circle cx="200" cy="60"  r="20" fill="url(#node)"/>
    <circle cx="320" cy="80"  r="20" fill="url(#node)"/>
    <circle cx="200" cy="160" r="20" fill="url(#node)"/>
    <circle cx="120" cy="240" r="20" fill="url(#node)"/>
    <circle cx="280" cy="240" r="20" fill="url(#node)"/>
    <circle cx="400" cy="200" r="20" fill="url(#node)"/>
  </g>
  <g>
    <circle cx="80"  cy="80"  r="14" fill="url(#node)"/>
    <circle cx="200" cy="60"  r="14" fill="url(#node)"/>
    <circle cx="320" cy="80"  r="14" fill="url(#node)"/>
    <circle cx="200" cy="160" r="16" fill="url(#node)"/>
    <circle cx="120" cy="240" r="14" fill="url(#node)"/>
    <circle cx="280" cy="240" r="14" fill="url(#node)"/>
    <circle cx="400" cy="200" r="18" fill="#fff"/>
  </g>

  <!-- Caption -->
  <text x="240" y="295" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="14" fill="#c5d2ff" opacity="0.7">
    actors → resources → operations → target
  </text>
</svg>
