# ChainAPI — macOS CI on Azure DevOps Pipelines.
#
# Linux + Windows live on AppVeyor (see appveyor.yml). GitHub Actions is no
# longer used for ChainAPI builds.
#
# Branch routing:
#   * push to dev  → static checks + macos-debug   (ASan + UBSan + tests)
#   * push to main → static checks + macos-release (-O2, build only)
#
# Qt 6.8 LTS comes from the official Qt download mirror via aqtinstall, NOT
# from vcpkg. Building qtbase from source via vcpkg blew past per-job time
# limits on every provider we tried; pre-built Qt brings cold-cache builds
# to ~10-15 min total.
#
# Until the public-project parallel grant is approved, this org has 0 free
# Microsoft-hosted slots — pipeline will queue/fail at "Set up job" until
# the grant lands. See https://aka.ms/azpipelines-parallelism-request.

trigger:
  branches:
    include:
      - main
      - dev
  tags:
    exclude:
      - '*'

# Disable PR builds — pushes to dev/main are what matter.
pr: none

variables:
  # Pinned vcpkg baseline used elsewhere in the repo.
  VCPKG_COMMIT: aa40adda5352e87655b8583cfb2451d5e9e276fd
  # Qt version pin — must match appveyor.yml.
  QT_VERSION: 6.8.0
  AQT_VERSION: 3.1.18
  # vcpkg binary cache: small now that Qt is no longer in vcpkg.
  VCPKG_DEFAULT_BINARY_CACHE: $(Pipeline.Workspace)/vcpkg-bincache
  VCPKG_BINARY_SOURCES: 'clear;files,$(Pipeline.Workspace)/vcpkg-bincache,readwrite'

stages:
  # ==========================================================================
  # Static checks — gates the macOS build. Cheap (≤ 1 min on Linux agent).
  # Runs the architectural boundary check and clang-format dry-run.
  # ==========================================================================
  - stage: static_checks
    displayName: Static Checks
    jobs:
      - job: lint
        displayName: Boundary + clang-format
        pool:
          vmImage: ubuntu-24.04
        steps:
          - checkout: self
            fetchDepth: 1

          - script: ./tools/ci/boundary-check.sh
            displayName: Architectural boundary check

          - script: |
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends clang-format-18
              sudo update-alternatives --install /usr/bin/clang-format clang-format \
                /usr/bin/clang-format-18 100
            displayName: Install clang-format-18

          - script: |
              set -euo pipefail
              mapfile -t files < <(
                find engine cli desktop ipc \
                  \( -name '*.h' -o -name '*.hpp' -o -name '*.cpp' -o -name '*.cc' \) \
                  -not -path '*/build/*' \
                  2>/dev/null
              )
              if [[ ${#files[@]} -eq 0 ]]; then
                echo "No C++ files found — nothing to check."
                exit 0
              fi
              clang-format --dry-run --Werror "${files[@]}"
            displayName: clang-format dry-run

  # ==========================================================================
  # macOS build — debug on dev, release on main.
  # ==========================================================================
  - stage: macos_build
    displayName: macOS Build
    dependsOn: static_checks
    condition: succeeded()
    jobs:
      - job: build
        displayName: macos-14
        pool:
          vmImage: macOS-14
        timeoutInMinutes: 90
        variables:
          # Branch-conditional preset. dev → macos-debug, main → macos-release.
          ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/main') }}:
            preset: macos-release
          ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/dev') }}:
            preset: macos-debug
          # vcpkg root used by the toolchain file pulled in by CMakePresets.
          VCPKG_ROOT: $(Build.SourcesDirectory)/vcpkg
          # Qt install root for aqtinstall.
          QT_INSTALL_DIR: $(Pipeline.Workspace)/Qt
          # Qt prefix consumed by find_package(Qt6 ...).
          CMAKE_PREFIX_PATH: $(Pipeline.Workspace)/Qt/$(QT_VERSION)/macos

        steps:
          - checkout: self
            fetchDepth: 1

          # ------------------------------------------------------------------
          # Build prerequisites. macos-14 ships with autoconf, automake,
          # libtool, pkg-config, and ninja preinstalled. Only autoconf-archive
          # (used by libb2's autoreconf step) is missing.
          # ------------------------------------------------------------------
          - script: |
              set -euo pipefail
              export HOMEBREW_NO_AUTO_UPDATE=1
              export HOMEBREW_NO_INSTALL_CLEANUP=1
              export HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1
              export HOMEBREW_NO_ENV_HINTS=1
              brew install --quiet autoconf-archive
            displayName: Install macOS build prerequisites

          # ------------------------------------------------------------------
          # CMake 4.x + aqtinstall via pip.
          # ------------------------------------------------------------------
          - script: |
              set -euo pipefail
              python3 -m pip install --upgrade --quiet --break-system-packages \
                "cmake~=4.0" "aqtinstall==$(AQT_VERSION)"
              cmake --version
            displayName: Install CMake 4.x and aqtinstall

          # ------------------------------------------------------------------
          # Qt 6.8 — cached between runs. ~250 MB extracted, ~3 min download
          # on cold cache.
          # ------------------------------------------------------------------
          - task: Cache@2
            displayName: Cache Qt $(QT_VERSION)
            inputs:
              key: '"qt" | "$(Agent.OS)" | "$(QT_VERSION)" | "macos"'
              path: $(QT_INSTALL_DIR)

          - script: |
              set -euo pipefail
              if [[ ! -d "$(QT_INSTALL_DIR)/$(QT_VERSION)/macos" ]]; then
                aqt install-qt mac desktop "$(QT_VERSION)" clang_64 \
                  --outputdir "$(QT_INSTALL_DIR)" \
                  --modules qtdeclarative
              else
                echo "Qt $(QT_VERSION) already present from cache."
              fi
              ls -1 "$(CMAKE_PREFIX_PATH)/lib/cmake/Qt6" | head -3
            displayName: Install Qt $(QT_VERSION)

          # ------------------------------------------------------------------
          # vcpkg — clone at the pinned commit. Cached between runs.
          # ------------------------------------------------------------------
          - task: Cache@2
            displayName: Cache vcpkg tool
            inputs:
              key: '"vcpkg-tool" | "$(Agent.OS)" | "$(VCPKG_COMMIT)"'
              path: $(VCPKG_ROOT)

          - script: |
              set -euo pipefail
              if [[ ! -x "$(VCPKG_ROOT)/vcpkg" ]]; then
                git clone https://github.com/microsoft/vcpkg.git "$(VCPKG_ROOT)"
                git -C "$(VCPKG_ROOT)" checkout "$(VCPKG_COMMIT)"
                "$(VCPKG_ROOT)/bootstrap-vcpkg.sh" -disableMetrics
              else
                echo "vcpkg already present from cache."
              fi
            displayName: Bootstrap vcpkg

          # ------------------------------------------------------------------
          # vcpkg binary cache — keyed on manifest hash. Now small since Qt
          # is no longer a vcpkg dependency.
          # ------------------------------------------------------------------
          - task: Cache@2
            displayName: Cache vcpkg binary archives
            inputs:
              key: '"vcpkg-bin" | "$(Agent.OS)" | "$(preset)" | vcpkg.json'
              path: $(VCPKG_DEFAULT_BINARY_CACHE)
              restoreKeys: |
                "vcpkg-bin" | "$(Agent.OS)" | "$(preset)"

          - script: mkdir -p "$(VCPKG_DEFAULT_BINARY_CACHE)"
            displayName: Ensure binary cache dir

          # ------------------------------------------------------------------
          # Configure / Build / Test
          # ------------------------------------------------------------------
          - script: cmake --preset $(preset)
            displayName: Configure ($(preset))

          - script: cmake --build --preset $(preset)
            displayName: Build ($(preset))

          - script: ctest --preset $(preset)
            displayName: Test ($(preset))
            condition: and(succeeded(), eq(variables['preset'], 'macos-debug'))
