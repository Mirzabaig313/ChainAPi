name: topic

operations:
  create:
    method: POST
    path: /posts.json
    actor: member
    depends_on: [category.create]
    body:
      title: "ChainAPI test topic {{$.uuid}}"
      raw: "This topic was created by ChainAPI validation."
      category: "{{category.category_id}}"
    expect_status: 200
    extract:
      topic_id: $.topic_id
      first_post_id: $.id
      topic_slug: $.topic_slug

  get:
    method: GET
    path: /t/{{topic.topic_id}}.json
    actor: member
    depends_on: [topic.create]
    expect_status: 200

  pin:
    method: PUT
    path: /t/{{topic.topic_id}}/status
    actor: admin
    depends_on: [topic.create]
    body:
      status: "pinned"
      enabled: "true"
    expect_status: 200

  close:
    method: PUT
    path: /t/{{topic.topic_id}}/status
    actor: admin
    depends_on: [topic.create]
    body:
      status: "closed"
      enabled: "true"
    expect_status: 200

  delete:
    method: DELETE
    path: /t/{{topic.topic_id}}.json
    actor: admin
    depends_on: [topic.create]
    expect_status: 200
