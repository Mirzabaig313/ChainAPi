name: "Set up C++ toolchain"
description: >
  Installs OS-specific build prerequisites (autotools, ninja, X11/XCB headers,
  MSVC environment), CMake 4.x, and vcpkg pinned to the project baseline.

runs:
  using: composite
  steps:
    - name: Install macOS build prerequisites
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew update
        brew install \
          autoconf \
          autoconf-archive \
          automake \
          libtool \
          pkg-config \
          ninja

    - name: Install Linux build prerequisites
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          autoconf \
          autoconf-archive \
          automake \
          libtool \
          pkg-config \
          ninja-build \
          bison \
          flex \
          python3 \
          python3-jinja2 \
          libx11-dev \
          libxext-dev \
          libxrender-dev \
          libxkbcommon-dev \
          libxkbcommon-x11-dev \
          libxcb1-dev \
          libxcb-cursor-dev \
          libxcb-glx0-dev \
          libxcb-icccm4-dev \
          libxcb-image0-dev \
          libxcb-keysyms1-dev \
          libxcb-randr0-dev \
          libxcb-render-util0-dev \
          libxcb-shape0-dev \
          libxcb-shm0-dev \
          libxcb-sync-dev \
          libxcb-util-dev \
          libxcb-xfixes0-dev \
          libxcb-xinerama0-dev \
          libxcb-xkb-dev \
          libxi-dev \
          libgl1-mesa-dev \
          libegl1-mesa-dev \
          libfontconfig1-dev \
          libfreetype6-dev \
          libdbus-1-dev

    - name: Set up MSVC environment
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Set up CMake 4.x
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: "~4.0.0"

    - name: Set up vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: aa40adda5352e87655b8583cfb2451d5e9e276fd
