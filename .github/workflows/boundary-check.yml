name: Architectural Boundary Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  boundary-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify engine and CLI do not include Qt UI headers
        run: ./tools/ci/boundary-check.sh
