name: Build & Test (main)

on:
  push:
    branches: [main]

env:
  # Cache built vcpkg packages in the GitHub Actions cache.
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  # --------------------------------------------------------------------------
  # Static checks — gates the heavy matrix.
  #   * Architectural boundary check (engine/CLI must not pull in Qt UI).
  #   * clang-format dry-run (every C++ file matches .clang-format).
  # --------------------------------------------------------------------------
  static-checks:
    name: Static Checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Architectural boundary check
        run: ./tools/ci/boundary-check.sh

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-format-18
          sudo update-alternatives --install /usr/bin/clang-format clang-format \
            /usr/bin/clang-format-18 100

      - name: clang-format check
        run: |
          mapfile -t files < <(
            find engine cli desktop ipc \
              \( -name '*.h' -o -name '*.hpp' -o -name '*.cpp' -o -name '*.cc' \) \
              -not -path '*/build/*' \
              2>/dev/null
          )
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No C++ files found — nothing to check."
            exit 0
          fi
          clang-format --dry-run --Werror "${files[@]}"

  # --------------------------------------------------------------------------
  # Release matrix — -O2 / NDEBUG build on macOS, Linux, Windows.
  # Catches bugs hidden by debug-only behaviour (UB the optimizer exploits,
  # stripped assertions, dead-code elimination of side-effecting code).
  # --------------------------------------------------------------------------
  release:
    name: ${{ matrix.os }} / ${{ matrix.preset }}
    needs: static-checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            preset: macos-release
          - os: ubuntu-24.04
            preset: linux-release
          - os: windows-2022
            preset: windows-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up C++ toolchain
        uses: ./.github/actions/setup-cpp

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}
