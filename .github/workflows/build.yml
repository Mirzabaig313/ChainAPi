name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.preset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            preset: macos-debug
          - os: macos-14
            preset: macos-release
          - os: ubuntu-24.04
            preset: linux-debug
          - os: ubuntu-24.04
            preset: linux-release
          - os: windows-2022
            preset: windows-debug
          - os: windows-2022
            preset: windows-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: master

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        if: contains(matrix.preset, 'debug')
        run: ctest --preset ${{ matrix.preset }}
