name: Build & Test

on:
  push:
    branches: [main, dev]

env:
  # Cache built vcpkg packages in the GitHub Actions cache.
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  # Cache source tarballs vcpkg downloads (zlib, libb2, qtbase, ...) so a
  # transient GitHub download blip doesn't fail the whole job.
  X_VCPKG_ASSET_SOURCES: "x-gha,readwrite"

jobs:
  # --------------------------------------------------------------------------
  # Static checks — gates the heavy matrix builds.
  #
  #   * Architectural boundary check (engine/CLI must not pull in Qt UI).
  #   * clang-format dry-run (every C++ file matches .clang-format).
  #
  # Cheap (≤ 1 min on Ubuntu). If this fails, debug/release are skipped and
  # the whole workflow fails — no point burning a Qt rebuild on a tree that
  # already violated a hard rule.
  # --------------------------------------------------------------------------
  static-checks:
    name: Static Checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Architectural boundary check
        run: ./tools/ci/boundary-check.sh

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-format-18
          sudo update-alternatives --install /usr/bin/clang-format clang-format \
            /usr/bin/clang-format-18 100

      - name: clang-format check
        run: |
          # Fail if any tracked C++ source under our four layers is not
          # already formatted to .clang-format.
          mapfile -t files < <(
            find engine cli desktop ipc \
              \( -name '*.h' -o -name '*.hpp' -o -name '*.cpp' -o -name '*.cc' \) \
              -not -path '*/build/*' \
              2>/dev/null
          )
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No C++ files found — nothing to check."
            exit 0
          fi
          clang-format --dry-run --Werror "${files[@]}"

  # --------------------------------------------------------------------------
  # Debug matrix — runs on push to `dev`. ASan + UBSan + tests.
  # Skipped if static-checks fails.
  # --------------------------------------------------------------------------
  debug:
    name: ${{ matrix.os }} / ${{ matrix.preset }}
    if: github.ref == 'refs/heads/dev'
    needs: static-checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            preset: macos-debug
          - os: ubuntu-24.04
            preset: linux-debug
          - os: windows-2022
            preset: windows-debug

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install macOS build prerequisites
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install \
            autoconf \
            autoconf-archive \
            automake \
            libtool \
            pkg-config \
            ninja

      - name: Install Linux build prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf \
            autoconf-archive \
            automake \
            libtool \
            pkg-config \
            ninja-build \
            bison \
            flex \
            python3 \
            python3-jinja2 \
            libx11-dev \
            libxext-dev \
            libxrender-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxcb1-dev \
            libxcb-cursor-dev \
            libxcb-glx0-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-render-util0-dev \
            libxcb-shape0-dev \
            libxcb-shm0-dev \
            libxcb-sync-dev \
            libxcb-util-dev \
            libxcb-xfixes0-dev \
            libxcb-xinerama0-dev \
            libxcb-xkb-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libdbus-1-dev

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up CMake 4.x
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~4.0.0"

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: aa40adda5352e87655b8583cfb2451d5e9e276fd

      - name: Configure
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 90
          max_attempts: 3
          retry_on: error
          command: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

  # --------------------------------------------------------------------------
  # Release matrix — runs on push to `main`.
  # Catches bugs that surface under -O2 / NDEBUG (UB the optimizer exploits,
  # stripped assertions, dead-code elimination of side-effecting code).
  # Skipped if static-checks fails.
  # --------------------------------------------------------------------------
  release:
    name: ${{ matrix.os }} / ${{ matrix.preset }}
    if: github.ref == 'refs/heads/main'
    needs: static-checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            preset: macos-release
          - os: ubuntu-24.04
            preset: linux-release
          - os: windows-2022
            preset: windows-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install macOS build prerequisites
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install \
            autoconf \
            autoconf-archive \
            automake \
            libtool \
            pkg-config \
            ninja

      - name: Install Linux build prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf \
            autoconf-archive \
            automake \
            libtool \
            pkg-config \
            ninja-build \
            bison \
            flex \
            python3 \
            python3-jinja2 \
            libx11-dev \
            libxext-dev \
            libxrender-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxcb1-dev \
            libxcb-cursor-dev \
            libxcb-glx0-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-render-util0-dev \
            libxcb-shape0-dev \
            libxcb-shm0-dev \
            libxcb-sync-dev \
            libxcb-util-dev \
            libxcb-xfixes0-dev \
            libxcb-xinerama0-dev \
            libxcb-xkb-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libdbus-1-dev

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up CMake 4.x
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~4.0.0"

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: aa40adda5352e87655b8583cfb2451d5e9e276fd

      - name: Configure
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 90
          max_attempts: 3
          retry_on: error
          command: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}
