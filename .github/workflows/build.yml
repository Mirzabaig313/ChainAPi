name: Build & Test (Linux + Windows)

# Linux + Windows CI on GitHub Actions. macOS lives on Azure DevOps
# (see azure-pipelines.yml) because that's already green and fast there.
#
# Branch routing:
#   * push to dev  → linux-debug   + windows-debug   (ASan/UBSan + tests)
#   * push to main → linux-release + windows-release (-O2, build only)
#
# Qt 6.8 LTS comes from the official Qt mirror via aqtinstall (the
# jurplel/install-qt-action wrapper), NOT vcpkg — building qtbase from
# source took 45-90 min. vcpkg supplies only the small non-Qt deps.

on:
  push:
    branches: [main, dev]

env:
  VCPKG_COMMIT: aa40adda5352e87655b8583cfb2451d5e9e276fd
  QT_VERSION: 6.8.3
  # Cache built vcpkg packages in the GitHub Actions cache.
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  # ==========================================================================
  # Static checks — architectural boundary guard. Gates the heavy matrix.
  # (clang-format is enforced locally by tools/pre-push-check.sh, not in CI.)
  # ==========================================================================
  static-checks:
    name: Static Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Architectural boundary check
        run: ./tools/ci/boundary-check.sh

  # ==========================================================================
  # Build matrix — Linux + Windows. Preset chosen by branch.
  # ==========================================================================
  build:
    name: ${{ matrix.os }} / ${{ matrix.name }}
    needs: static-checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: windows-latest
            name: windows

    steps:
      - uses: actions/checkout@v4

      # ----- Resolve preset from branch -----------------------------------
      - name: Resolve preset
        id: preset
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            cfg=release
          else
            cfg=debug
          fi
          echo "value=${{ matrix.name }}-${cfg}" >> "$GITHUB_OUTPUT"
          echo "Selected preset: ${{ matrix.name }}-${cfg}"

      # ----- Linux build prerequisites ------------------------------------
      # GCC 14 is mandatory: the codebase uses <print> (std::println), which
      # libstdc++ ships only from GCC 14 onward. ubuntu-latest (24.04) defaults
      # to GCC 13, which has no <print> header. Install g++-14 and select it
      # via CC/CXX below so the CMake preset's compiler detection picks it up.
      - name: Install Linux build prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-14 g++-14 \
            autoconf autoconf-archive automake libtool pkg-config \
            ninja-build \
            libsecret-1-dev \
            libx11-dev libxext-dev libxrender-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libxcb1-dev libxcb-cursor-dev libxcb-glx0-dev libxcb-icccm4-dev \
            libxcb-image0-dev libxcb-keysyms1-dev libxcb-randr0-dev \
            libxcb-render-util0-dev libxcb-shape0-dev libxcb-shm0-dev \
            libxcb-sync-dev libxcb-util-dev libxcb-xfixes0-dev \
            libxcb-xinerama0-dev libxcb-xkb-dev libxi-dev \
            libgl1-mesa-dev libegl1-mesa-dev \
            libfontconfig1-dev libfreetype6-dev libdbus-1-dev

      - name: Select GCC 14 (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "CC=gcc-14" >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"

      # ----- CMake 4.x (both OSes) ----------------------------------------
      - name: Set up CMake 4.x + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~4.0.0"

      # ----- Qt 6.8 via aqtinstall ----------------------------------------
      # install-qt-action puts Qt's bin on PATH and exports QT_ROOT_DIR.
      # We also export CMAKE_PREFIX_PATH explicitly below so CMakePresets
      # (which reads it from the environment) finds Qt6 deterministically.
      #
      # Linux needs the `icu` archive: Qt's own tools (qtpaths, used by
      # QtKeychain's CMake at configure time) link against libicui18n.so at
      # runtime. Windows/macOS bake ICU into the Qt libs, so they don't.
      - name: Install Qt (Linux)
        if: runner.os == 'Linux'
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          archives: qtbase qtdeclarative qtsvg icu
          cache: true

      - name: Install Qt (Windows / macOS)
        if: runner.os != 'Linux'
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          archives: qtbase qtdeclarative qtsvg
          cache: true

      - name: Export CMAKE_PREFIX_PATH for Qt
        shell: bash
        run: echo "CMAKE_PREFIX_PATH=${QT_ROOT_DIR}" >> "$GITHUB_ENV"

      - name: Export CMAKE_PREFIX_PATH for Qt
        shell: bash
        run: echo "CMAKE_PREFIX_PATH=${QT_ROOT_DIR}" >> "$GITHUB_ENV"

      # ----- MSVC environment (Windows) -----------------------------------
      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ----- vcpkg --------------------------------------------------------
      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}

      # ----- Configure / Build / Test -------------------------------------
      # install-qt-action sets Qt6_DIR / CMAKE_PREFIX_PATH via the QT_ROOT_DIR
      # it exports, and lukka/run-vcpkg sets VCPKG_ROOT. CMakePresets reads
      # both from the environment.
      - name: Configure
        run: cmake --preset ${{ steps.preset.outputs.value }}

      - name: Build
        run: cmake --build --preset ${{ steps.preset.outputs.value }}

      - name: Test
        if: endsWith(steps.preset.outputs.value, '-debug')
        run: ctest --preset ${{ steps.preset.outputs.value }}
